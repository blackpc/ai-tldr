name: Update releases (every 2h)

# Runs the AI/TLDR daily release sweep on a schedule.
#
# What it does:
#   1. Checks out the repo
#   2. Installs Bun deps
#   3. Runs Claude Code with a short delegation prompt that reads
#      prompts/update-releases.md and follows it (web-fetch + verify
#      every URL/image, refresh src/data/releases.json)
#   4. Runs `bun run build` to confirm the new feed parses + page builds.
#      The build command is `tsc -b && vite build && bun scripts/prerender.ts`,
#      so it also generates per-release static HTML pages for SEO. The
#      `dist/` output is gitignored — only releases.json is committed;
#      Cloudflare Pages rebuilds and redeploys on every push to master.
#   5. If src/data/releases.json changed, commits + pushes back to master
#
# Required secret:
#   CLAUDE_CODE_OAUTH_TOKEN — generate locally with `claude setup-token`
#                              then `gh secret set CLAUDE_CODE_OAUTH_TOKEN`
#                              (or paste it in the GitHub UI)

on:
  schedule:
    # every 2 hours at minute 0
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  # id-token: write is required by anthropics/claude-code-action@v1 — it
  # fetches an OIDC token from GitHub during setup. Without it the action
  # fails before Claude even starts: "Could not fetch an OIDC token."
  id-token: write

concurrency:
  group: update-releases
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    # Job cap is sized for 2 sweep attempts × 30m each + ~5m for
    # checkout / bun install / show-diff / commit / push. Each sweep
    # attempt has its OWN step-level timeout-minutes:30 so a silent
    # claude-code-action hang trips the step, not the whole job — that
    # lets the retry step actually run. (Observed failure mode: the SDK
    # sits idle for 25+ minutes after a 429 or even a clean 200 and
    # never recovers. Step-level timeout is the only safe escape.)
    timeout-minutes: 65

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # use default GITHUB_TOKEN; permissions: contents:write above
          # gives us push rights for the bot commit at the end

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture current timestamp
        id: now
        run: |
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "iso=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run release sweep with Claude Code (attempt 1)
        id: sweep1
        uses: anthropics/claude-code-action@v1
        # Step-level timeout: if the action hangs silently we want to
        # fail THIS step (so the retry step can run), not let the job
        # timeout kill everything. 30m gives healthy runs plenty of
        # headroom (observed p100 ~18m) while still catching hangs.
        timeout-minutes: 30
        # continue-on-error is what lets the retry step run after a
        # hang/failure. Without this, a step failure would short-circuit
        # the job and the retry would be skipped.
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Stream Claude's progress into the GH Actions log instead of
          # buffering until the run ends. show_full_output dumps the raw
          # CLI JSON, display_report posts a Step Summary at the end.
          show_full_output: "true"
          display_report: "true"
          # Short delegation prompt — the real prompt is the file in the
          # repo, which Claude reads via its Read tool. Single source of
          # truth: prompts/update-releases.md.
          prompt: |
            You are running as the AI/TLDR scheduled release updater inside
            a GitHub Actions workflow. The working directory is the repo
            root.

            TODAY'S DATE IS ${{ steps.now.outputs.date }}. This is the
            real, current UTC date from the GitHub runner's system clock.
            It is NOT fictional, NOT a test fixture, NOT a placeholder.
            Your training data predates this date, so releases you find
            in the feed (e.g. "Gemma 4", "GPT-5.4") may be unfamiliar to
            you — that is expected and correct. Do NOT spend thinking
            tokens debating whether the date or the feed's past entries
            are "real". Trust the system clock, trust the repo state, and
            trust what WebFetch returns from live URLs. If WebFetch
            reports a release date, USE THAT DATE VERBATIM — never
            "adjust" a fetched date to match any other convention.

            STEP 1. Read the file `prompts/update-releases.md` from the
            repo. That file is the SINGLE SOURCE OF TRUTH for how to
            refresh `src/data/releases.json`. Follow it exactly. Pay
            particular attention to the ZERO-HALLUCINATION POLICY at the
            top — every `url`, every entry in `links`, and every `image.url`
            MUST be fetched in this run with WebFetch and confirmed to
            return 200 + relevant content. No memory-based URLs.

            STEP 2. Use ${{ steps.now.outputs.date }} for the `--since`
            window (last 6 hours). Set `generatedAt` to EXACTLY
            "${{ steps.now.outputs.iso }}" — this is the precise timestamp
            of this sweep run; do NOT round it or pick a different time.
            Set `source` to
            `"github-actions-sweep"`.

            STEP 3. Quality bar, NOT a quota. Only include releases
            that are genuinely notable — trending repos with real
            adoption, products with real launches, papers people are
            actually discussing, models people will actually run.
            Don't pad to hit a number, don't skip a hot week to stay
            small. A typical 2-hour sweep is 0–5 items. If the window
            genuinely has 25 hot releases, ship 25. If it has 2, ship
            2. Zero filler, ever. Follow the "Search diversity — fill
            the gaps" strategy in the prompt file to broaden coverage,
            but never add a weak item just to expand the list.

            STEP 4. Generate a sweep report. Read `src/data/sweeps.json`
            and APPEND one new entry to the `sweeps` array describing
            what this run changed. Do NOT rewrite existing entries.
            The new entry must conform to `SweepReport` in
            `src/data/schema.ts`. Required fields:
              - `id`: "sweep-<generatedAt ISO, compacted>"
              - `timestamp`: same as feed `generatedAt`
              - `source`: "github-actions-sweep" (or "manual-<reason>"
                for manual runs)
              - `summary`: 1–2 sentences, friendly and direct tone.
                Summarize the sweep as a whole. Same banned words as
                explainer copy (no "revolutionary", "game-changing"…).
              - `counts`: { added, updated, removed }
              - `added`: array of { id, title, category (the primary
                one), note } — `note` is ONE sentence explaining why
                this item was included.
              - `updated` / `removed`: fill in if you modified or
                dropped items, otherwise `[]`.
            Write the file back. The log page reads this file directly.

            STEP 5. After writing both files, run `bun run build` to
            confirm releases.json + sweeps.json still parse, the page
            builds, AND the per-release + /log static HTML pages
            generate without errors (scripts/prerender.ts runs as the
            last build step). If any step fails, fix and re-run until
            the full build passes.

            STEP 6. Stop. Do NOT commit or push yourself — the next
            workflow step handles the git ops. Just leave the modified
            files in the working tree.

            Return a short report (≤200 words) of what you changed.
          claude_args: |
            --model claude-sonnet-4-6
            --verbose
            --max-turns 60
            --permission-mode acceptEdits
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Bash(bun:*),Bash(ls:*),Bash(cat:*),Bash(grep:*),Bash(rm:*)"

      - name: Reset working tree before retry
        # Attempt 1 may have written partial changes before hanging.
        # Revert tracked files to HEAD so attempt 2 starts clean — we
        # don't want attempt 2 to either see half-written JSON or fight
        # with duplicate sweep-report entries.
        if: steps.sweep1.outcome == 'failure'
        run: |
          echo "::warning::Sweep attempt 1 failed or timed out — resetting and retrying."
          git checkout -- src/data/releases.json src/data/sweeps.json 2>/dev/null || true
          git status --short

      - name: Run release sweep with Claude Code (attempt 2)
        id: sweep2
        # Only runs if attempt 1 failed (timed out, errored, or hung
        # past the 30m step timeout). Same inputs, no continue-on-error
        # — if this one also fails, the job fails and the commit step
        # is skipped automatically (default if: success() gating).
        if: steps.sweep1.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 30
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: "true"
          display_report: "true"
          prompt: |
            You are running as the AI/TLDR scheduled release updater inside
            a GitHub Actions workflow. The working directory is the repo
            root. THIS IS A RETRY — the previous attempt in this same job
            failed or hung. The working tree has been reset to HEAD, so
            start fresh and do not assume any prior partial state.

            TODAY'S DATE IS ${{ steps.now.outputs.date }}. This is the
            real, current UTC date from the GitHub runner's system clock.
            It is NOT fictional, NOT a test fixture, NOT a placeholder.
            Your training data predates this date, so releases you find
            in the feed (e.g. "Gemma 4", "GPT-5.4") may be unfamiliar to
            you — that is expected and correct. Do NOT spend thinking
            tokens debating whether the date or the feed's past entries
            are "real". Trust the system clock, trust the repo state, and
            trust what WebFetch returns from live URLs. If WebFetch
            reports a release date, USE THAT DATE VERBATIM — never
            "adjust" a fetched date to match any other convention.

            STEP 1. Read the file `prompts/update-releases.md` from the
            repo. That file is the SINGLE SOURCE OF TRUTH for how to
            refresh `src/data/releases.json`. Follow it exactly. Pay
            particular attention to the ZERO-HALLUCINATION POLICY at the
            top — every `url`, every entry in `links`, and every `image.url`
            MUST be fetched in this run with WebFetch and confirmed to
            return 200 + relevant content. No memory-based URLs.

            STEP 2. Use ${{ steps.now.outputs.date }} for the `--since`
            window (last 6 hours). Set `generatedAt` to EXACTLY
            "${{ steps.now.outputs.iso }}" — this is the precise timestamp
            of this sweep run; do NOT round it or pick a different time.
            Set `source` to
            `"github-actions-sweep"`.

            STEP 3. Quality bar, NOT a quota. Only include releases
            that are genuinely notable — trending repos with real
            adoption, products with real launches, papers people are
            actually discussing, models people will actually run.
            Don't pad to hit a number, don't skip a hot week to stay
            small. A typical 2-hour sweep is 0–5 items. If the window
            genuinely has 25 hot releases, ship 25. If it has 2, ship
            2. Zero filler, ever. Follow the "Search diversity — fill
            the gaps" strategy in the prompt file to broaden coverage,
            but never add a weak item just to expand the list.

            STEP 4. Generate a sweep report. Read `src/data/sweeps.json`
            and APPEND one new entry to the `sweeps` array describing
            what this run changed. Do NOT rewrite existing entries.
            The new entry must conform to `SweepReport` in
            `src/data/schema.ts`. Required fields:
              - `id`: "sweep-<generatedAt ISO, compacted>"
              - `timestamp`: same as feed `generatedAt`
              - `source`: "github-actions-sweep-retry" (because this is
                the 2nd attempt in the job — helps us see retries in
                the /log page)
              - `summary`: 1–2 sentences, friendly and direct tone.
                Summarize the sweep as a whole. Same banned words as
                explainer copy (no "revolutionary", "game-changing"…).
              - `counts`: { added, updated, removed }
              - `added`: array of { id, title, category (the primary
                one), note } — `note` is ONE sentence explaining why
                this item was included.
              - `updated` / `removed`: fill in if you modified or
                dropped items, otherwise `[]`.
            Write the file back. The log page reads this file directly.

            STEP 5. After writing both files, run `bun run build` to
            confirm releases.json + sweeps.json still parse, the page
            builds, AND the per-release + /log static HTML pages
            generate without errors (scripts/prerender.ts runs as the
            last build step). If any step fails, fix and re-run until
            the full build passes.

            STEP 6. Stop. Do NOT commit or push yourself — the next
            workflow step handles the git ops. Just leave the modified
            files in the working tree.

            Return a short report (≤200 words) of what you changed.
          claude_args: |
            --model claude-sonnet-4-6
            --verbose
            --max-turns 60
            --permission-mode acceptEdits
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Bash(bun:*),Bash(ls:*),Bash(cat:*),Bash(grep:*),Bash(rm:*)"

      - name: Show diff
        run: |
          echo "::group::git status"
          git status --short
          echo "::endgroup::"
          echo "::group::git diff src/data/releases.json"
          git --no-pager diff src/data/releases.json | head -200 || true
          echo "::endgroup::"

      - name: Commit and push if releases.json or sweeps.json changed
        env:
          # Pass the workflow's GITHUB_TOKEN explicitly. The Claude Code
          # action mutates git config during its run and the credential
          # helper installed by actions/checkout no longer applies — so
          # we embed the token directly in the push URL below.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain src/data/releases.json src/data/sweeps.json)" ]]; then
            echo "No changes to releases.json or sweeps.json — nothing to commit."
            exit 0
          fi
          git config user.name  "ai-tldr-bot"
          git config user.email "41898282+ai-tldr-bot@users.noreply.github.com"
          git add src/data/releases.json src/data/sweeps.json
          git commit -m "feat(content): scheduled release sweep $(date -u +%Y-%m-%dT%H:%MZ)

          Refreshed src/data/releases.json and appended a sweep log
          entry to src/data/sweeps.json via prompts/update-releases.md.

          Co-Authored-By: Claude Code Action <noreply@anthropic.com>"
          # Push via tokenized HTTPS URL — survives any prior git config
          # mutation. Token is masked in logs by the runner.
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
