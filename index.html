<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />

    <!--
      Per-page <title>, <meta name="description">, <link rel="canonical">,
      and all og:*/twitter:*/article:* tags are injected at build time by
      scripts/prerender.ts — one set per release + one for each static
      page (home, influencers). The tags below are the dev-mode fallback
      for `bun dev`; they get replaced in the production build.
    -->
    <title>AI/TLDR — New AI Models, Tools & Papers This Week</title>
    <meta name="description" content="Daily curated feed of new AI releases — each explained so you actually understand what shipped and why it matters." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="AI/TLDR" />
    <meta name="keywords" content="AI news, new AI models, LLM releases, AI tools, machine learning papers, AI benchmarks, open source AI, AI repos, weekly AI roundup" />
    <meta name="theme-color" content="#050505" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AI/TLDR",
      "alternateName": "AI TLDR",
      "url": "/",
      "description": "Daily curated feed of new AI models, repos, tools, algorithms, papers, datasets and benchmarks — each explained for humans.",
      "publisher": {
        "@type": "Organization",
        "name": "AI/TLDR"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>
      <h1>AI/TLDR — Daily AI Release Sweep</h1>
      <p>This site requires JavaScript to display the interactive release feed. Enable JavaScript or visit the <a href="https://github.com/blackpc/ai-tldr">source repo</a> for the raw data.</p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script defer src="https://analytics.pomegra.io/script.js" data-website-id="f06d903f-bd3d-491f-b2dd-29bd3397300f"></script>
  </body>
</html>
