<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />

    <!--
      Per-page <title>, <meta name="description">, <link rel="canonical">,
      all og:*/twitter:*/article:* tags, and the JSON-LD block below are
      ALL stripped and replaced at build time by scripts/prerender.ts —
      one set per release + one for each static page (home, influencers,
      log). The tags here are the dev-mode fallback for `bun dev`; they
      get swapped out in the production build, so the homepage variants
      are the only ones that actually matter at runtime.
    -->
    <title>New AI Releases Daily — Models, Tools & Papers | AI/TLDR</title>
    <meta name="description" content="Every new AI model, repo, tool, and paper worth knowing — refreshed every 8 hours and explained in plain English. Track what's shipping today." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="author" content="AI/TLDR" />
    <meta name="keywords" content="new AI releases, AI release tracker, AI changelog, new AI models, LLM releases, AI tools, new AI repos, machine learning papers, AI benchmarks, open source AI, AI news daily" />
    <meta name="theme-color" content="#050505" />

    <!-- Structured Data (JSON-LD) — dev-mode fallback; prerender rewrites for prod -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://ai-tldr.dev/#website",
          "url": "https://ai-tldr.dev/",
          "name": "AI/TLDR",
          "alternateName": "AI TLDR",
          "description": "Every new AI model, repo, tool, and paper worth knowing — refreshed every 8 hours and explained in plain English.",
          "inLanguage": "en-US",
          "publisher": { "@id": "https://ai-tldr.dev/#org" }
        },
        {
          "@type": "Organization",
          "@id": "https://ai-tldr.dev/#org",
          "name": "AI/TLDR",
          "url": "https://ai-tldr.dev/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://ai-tldr.dev/og-image.png",
            "width": 1200,
            "height": 630
          }
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>
      <h1>AI/TLDR — New AI Releases Daily: Models, Tools, Repos &amp; Papers</h1>
      <p>A high-volume feed of new AI releases — models, open-source repos, developer tools, papers, datasets, and benchmarks — refreshed every 8 hours. Each release is explained in plain English so you actually understand what shipped.</p>
      <p>This site uses JavaScript to render the interactive feed. Enable JavaScript, or visit the <a href="https://github.com/blackpc/ai-tldr">source repo</a> for the raw JSON.</p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script defer src="https://analytics.pomegra.io/script.js" data-website-id="f06d903f-bd3d-491f-b2dd-29bd3397300f"></script>
  </body>
</html>
